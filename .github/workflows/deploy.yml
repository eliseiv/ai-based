name: Deploy

# Деплой на общий сервер за Traefik: по push в main подключаемся по SSH и
# обновляем сервис в /opt/ai-based. Traefik не трогаем — маршрут берётся из
# docker-labels контейнера (docker-compose.prod.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ai-based
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s <<'EOF'
          set -euo pipefail
          cd /opt/ai-based
          git pull --ff-only
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f >/dev/null 2>&1 || true
          EOF

      - name: Smoke test (healthz)
        run: |
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://appstorepro.store/healthz || true)
            if [ "$code" = "200" ]; then echo "healthz OK"; exit 0; fi
            echo "attempt $i: HTTP $code, retrying..."; sleep 5
          done
          echo "healthz did not return 200 in time"; exit 1
